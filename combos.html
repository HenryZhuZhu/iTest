<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iTest · Combo Picker</title>

<script>
  (function () {
    const stored = localStorage.getItem('itest-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'dark' || (!stored && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>

<style>
  /* ============ TOKENS (Apple aesthetic) ============ */
  :root {
    --bg: #fbfbfd;
    --surface: #ffffff;
    --surface-2: #f5f5f7;
    --text: #1d1d1f;
    --muted: #86868b;
    --border: rgba(0, 0, 0, 0.08);
    --border-strong: rgba(0, 0, 0, 0.14);
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.06);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.08);
    --nav-bg: rgba(251, 251, 253, 0.82);
  }
  html.dark {
    --bg: #000000;
    --surface: #1d1d1f;
    --surface-2: #161617;
    --text: #f5f5f7;
    --muted: #86868b;
    --border: rgba(255, 255, 255, 0.10);
    --border-strong: rgba(255, 255, 255, 0.16);
    --accent: #2997ff;
    --accent-hover: #47a7ff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.3);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
    --nav-bg: rgba(0, 0, 0, 0.82);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color .3s ease, color .3s ease;
    font-size: 15px;
    line-height: 1.5;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font: inherit; }

  /* ============ PICKER BAR ============ */
  .picker {
    position: sticky; top: 0; z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 20px;
    flex-wrap: wrap;
  }
  .picker-brand {
    font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
    padding-right: 16px;
    border-right: 1px solid var(--border);
  }
  .picker-brand .glyph {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: linear-gradient(135deg, #0071e3, #5e5ce6, #af52de);
    box-shadow: var(--shadow-sm);
  }
  .picker-brand .sub {
    color: var(--muted); font-weight: 500; font-size: 12px;
  }
  .picker-controls {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .picker-group {
    display: flex; align-items: center; gap: 8px;
  }
  .picker-group label {
    font-size: 10px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .picker-seg {
    display: inline-flex; padding: 3px;
    background: var(--surface-2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .picker-seg button {
    padding: 5px 12px; border-radius: 5px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    transition: background .15s, color .15s, box-shadow .15s;
    min-width: 28px;
  }
  .picker-seg button.active {
    background: var(--surface); color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .picker-seg button:not(.active):hover { color: var(--text); }
  .picker-group.page .picker-seg button { padding: 5px 14px; font-weight: 600; }
  .picker-group.dim { opacity: 0.45; transition: opacity .2s; }

  .picker-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }
  .picker-right .combo-label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; color: var(--muted);
    padding: 5px 10px; border-radius: 6px;
    background: var(--surface-2); border: 1px solid var(--border);
    white-space: nowrap;
  }
  .picker-right .combo-label strong {
    color: var(--text); font-weight: 600;
  }
  .theme-toggle {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border-radius: 8px;
    color: var(--muted); transition: background .15s, color .15s;
    border: 1px solid var(--border);
  }
  .theme-toggle:hover { background: var(--surface-2); color: var(--text); }
  .theme-toggle svg { width: 14px; height: 14px; }

  /* Hint footer below picker */
  .picker-hint {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .picker-hint code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    padding: 2px 6px; border-radius: 4px;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text);
  }

  /* ============ SHARED PREVIEW UI ============ */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    height: 44px; padding: 0 22px;
    border-radius: 980px;
    background: var(--accent); color: white;
    font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
    transition: background .15s ease, transform .15s ease;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 6px;
    height: 44px; padding: 0 22px;
    border-radius: 980px;
    background: transparent; color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
    transition: background .15s ease;
  }
  .btn-secondary:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--accent);
    font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
  }
  .btn-ghost:hover { text-decoration: underline; text-underline-offset: 4px; }
  .chevron { width: 12px; height: 12px; }

  .mini-logo {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600; letter-spacing: -0.01em;
  }
  .mini-logo .glyph {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: linear-gradient(140deg, #1d1d1f 0%, #424245 100%);
    display: grid; place-items: center;
    box-shadow: var(--shadow-sm);
  }
  html.dark .mini-logo .glyph {
    background: linear-gradient(140deg, #f5f5f7 0%, #c7c7cc 100%);
  }
  .mini-logo .glyph svg { width: 14px; height: 14px; }
  .mini-logo .glyph svg path,
  .mini-logo .glyph svg rect { stroke: white; }
  html.dark .mini-logo .glyph svg path,
  html.dark .mini-logo .glyph svg rect { stroke: #1d1d1f; }

  /* ============ HEADER VARIATIONS ============ */
  .hdr-base {
    position: relative;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
  }
  .hdr-A {
    height: 56px;
    background: var(--nav-bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    padding: 0 32px;
  }
  .hdr-A .links {
    display: flex; align-items: center; gap: 28px;
    font-size: 13px; color: var(--text);
  }
  .hdr-A .links a { opacity: .85; transition: opacity .15s; }
  .hdr-A .links a:hover { opacity: 1; }
  .hdr-A .links .logo { font-weight: 600; }
  .hdr-A .right { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); display: flex; gap: 8px; }
  .hdr-A .icon-btn {
    width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center;
    color: var(--muted); transition: background .15s, color .15s;
  }
  .hdr-A .icon-btn:hover { background: var(--surface-2); color: var(--text); }

  .hdr-B-wrap {
    padding: 16px 24px; display: flex; justify-content: center;
    background: linear-gradient(180deg, var(--surface-2), var(--bg));
  }
  .hdr-B {
    display: flex; align-items: center; gap: 4px;
    padding: 6px;
    border-radius: 999px;
    background: var(--nav-bg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    backdrop-filter: blur(20px) saturate(180%);
  }
  .hdr-B .pill-item {
    padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
    color: var(--text); transition: background .15s;
  }
  .hdr-B .pill-item:hover { background: var(--surface-2); }
  .hdr-B .pill-item.active { background: var(--text); color: var(--bg); }
  .hdr-B .sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .hdr-B .icon-pill {
    width: 34px; height: 34px; border-radius: 999px; display: grid; place-items: center;
    color: var(--muted); transition: background .15s, color .15s;
  }
  .hdr-B .icon-pill:hover { background: var(--surface-2); color: var(--text); }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(52,199,89,.55); }
    70%  { box-shadow: 0 0 0 6px rgba(52,199,89,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,199,89,0); }
  }

  /* ============ HERO VARIATIONS ============ */
  .hero {
    padding: 96px 32px;
    text-align: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .hero .eyebrow {
    font-size: 13px; font-weight: 500; color: var(--accent);
    letter-spacing: -0.01em; margin-bottom: 18px;
  }
  .hero h1 {
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 600; letter-spacing: -0.035em;
    line-height: 1.02; margin: 0 0 24px;
    max-width: 900px; margin-left: auto; margin-right: auto;
  }
  .hero h1 .grad {
    background: linear-gradient(120deg, #0071e3 0%, #5e5ce6 50%, #af52de 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  html.dark .hero h1 .grad {
    background: linear-gradient(120deg, #2997ff 0%, #5e5ce6 50%, #bf5af2 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero p.sub {
    font-size: clamp(18px, 1.6vw, 21px);
    color: var(--muted); line-height: 1.4;
    max-width: 640px; margin: 0 auto 36px;
  }
  .hero .actions { display: inline-flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center; }

  .hero-C { padding: 88px 32px 80px; text-align: center; }
  .hero-C .pills {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    max-width: 760px; margin: 32px auto 36px;
  }
  .hero-C .pill {
    padding: 8px 14px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 13px; color: var(--text); font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
    transition: border-color .15s, background .15s;
  }
  .hero-C .pill:hover { border-color: var(--border-strong); }
  .hero-C .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* ============ CORE MODULES VARIATIONS ============ */
  .modules-wrap { padding: 56px 32px; }
  .modules-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 32px;
  }
  .modules-head h2 {
    font-size: 40px; font-weight: 600; letter-spacing: -0.025em;
    margin: 0;
  }
  .modules-head .desc { color: var(--muted); font-size: 17px; margin: 8px 0 0; }
  .modules-head .meta { font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; color: var(--muted); }

  .grid-A {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  .card-A {
    border-radius: 28px;
    padding: 28px;
    min-height: 220px;
    display: flex; flex-direction: column; justify-content: space-between;
    color: var(--text);
    position: relative; overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .card-A:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .card-A .icon-tile {
    width: 52px; height: 52px; border-radius: 14px;
    display: grid; place-items: center;
    box-shadow: var(--shadow-sm);
  }
  .card-A .icon-tile svg { width: 24px; height: 24px; color: white; }
  .card-A h3 { font-size: 22px; font-weight: 600; letter-spacing: -0.015em; margin: 16px 0 4px; }
  .card-A p { font-size: 14px; color: var(--muted); margin: 0; line-height: 1.45; }
  .card-A .open { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
  .card-A .open-label { font-size: 13px; color: var(--accent); font-weight: 500; }
  .card-A .arrow { width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); display: grid; place-items: center; transition: transform .2s, background .2s; }
  .card-A:hover .arrow { transform: translate(2px, -2px); background: var(--accent); color: white; }

  .grad-1 { background: linear-gradient(140deg, #00b4d8, #0077b6); }
  .grad-2 { background: linear-gradient(140deg, #ff9500, #ff6b00); }
  .grad-3 { background: linear-gradient(140deg, #af52de, #5e5ce6); }
  .grad-4 { background: linear-gradient(140deg, #34c759, #00a86b); }
  .grad-5 { background: linear-gradient(140deg, #ff3b30, #ff2d55); }
  .grad-6 { background: linear-gradient(140deg, #5856d6, #007aff); }
  .grad-7 { background: linear-gradient(140deg, #424245, #1d1d1f); }
  html.dark .grad-7 { background: linear-gradient(140deg, #6e6e73, #2a2a2c); }

  .card-A.collection {
    grid-column: 1 / -1;
    flex-direction: row;
    align-items: center;
    gap: 28px;
    padding: 28px 32px;
    min-height: 0;
  }
  .card-A.collection .icon-tile { width: 60px; height: 60px; border-radius: 18px; flex-shrink: 0; }
  .card-A.collection .icon-tile svg { width: 28px; height: 28px; }
  .card-A.collection .text-block { flex: 1; min-width: 0; }
  .card-A.collection h3 { font-size: 24px; margin: 0 0 4px; }
  .card-A.collection p { font-size: 14px; }
  .card-A.collection .meta-row {
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }
  .card-A.collection .tool-count {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; color: var(--muted);
    padding: 4px 10px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
  }
  .card-A.collection .arrow { width: 36px; height: 36px; }

  .bento {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 200px;
    gap: 16px;
  }
  .bento-card {
    border-radius: 24px; padding: 24px;
    background: var(--surface); border: 1px solid var(--border);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .bento-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .bento-card.feat { grid-column: span 2; grid-row: span 2; }
  .bento-card.wide { grid-column: span 2; }
  .bento-card h3 { font-size: 20px; font-weight: 600; letter-spacing: -0.015em; margin: 0 0 6px; }
  .bento-card.feat h3 { font-size: 32px; letter-spacing: -0.025em; }
  .bento-card p { font-size: 13px; color: var(--muted); margin: 0; line-height: 1.5; }
  .bento-card.feat p { font-size: 16px; max-width: 360px; }
  .bento-card .ic-sm {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center; color: white;
    margin-bottom: auto;
  }
  .bento-card .ic-sm svg { width: 18px; height: 18px; }
  .bento-card .ic-lg {
    width: 56px; height: 56px; border-radius: 16px;
    display: grid; place-items: center; color: white;
    box-shadow: var(--shadow-sm);
  }
  .bento-card .ic-lg svg { width: 26px; height: 26px; }

  /* ============ EFA TOOLS VARIATIONS ============ */
  .efa-wrap { padding: 56px 32px; }
  .efa-head { margin-bottom: 36px; }
  .efa-head h2 { font-size: 40px; font-weight: 600; letter-spacing: -0.025em; margin: 0 0 8px; }
  .efa-head p { color: var(--muted); font-size: 17px; margin: 0; }
  .efa-head .breadcrumb {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--muted); margin-bottom: 16px;
  }
  .efa-head .breadcrumb a { color: var(--accent); transition: color .15s; display: inline-flex; align-items: center; gap: 4px; }
  .efa-head .breadcrumb a:hover { color: var(--accent-hover); }
  .efa-head .breadcrumb .sep { opacity: .5; }

  .seg {
    display: inline-flex; padding: 4px;
    background: var(--surface-2);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .seg button {
    padding: 8px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 500; color: var(--text);
    transition: background .2s ease, color .2s ease, box-shadow .2s ease;
  }
  .seg button.active {
    background: var(--surface); box-shadow: var(--shadow-sm);
  }
  .seg button:not(.active):hover { color: var(--muted); }
  .efa-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  }
  .tool-card {
    padding: 20px;
    border-radius: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: transform .2s ease, box-shadow .2s ease;
    display: flex; flex-direction: column; gap: 10px;
  }
  .tool-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .tool-card .tag {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 10px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .tool-card h4 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .tool-card p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.45; }
  .tool-card .arrow-sm {
    margin-top: auto; align-self: flex-end;
    color: var(--muted); transition: transform .2s, color .2s;
  }
  .tool-card:hover .arrow-sm { color: var(--accent); transform: translate(2px, -2px); }

  .efa-c { display: grid; grid-template-columns: 220px 1fr; gap: 28px; }
  .efa-c-side {
    display: flex; flex-direction: column; gap: 2px;
    position: sticky; top: 100px; align-self: start;
  }
  .efa-c-side .side-link {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px;
    font-size: 14px; color: var(--text); font-weight: 500;
    transition: background .15s;
  }
  .efa-c-side .side-link:hover { background: var(--surface-2); }
  .efa-c-side .side-link.active { background: var(--surface-2); color: var(--text); }
  .efa-c-side .side-link .side-dot { width: 8px; height: 8px; border-radius: 50%; }
  .efa-c-side .side-link .side-count { margin-left: auto; font-family: ui-monospace, "SF Mono", monospace; font-size: 11px; color: var(--muted); }
  .efa-c-main h3 {
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 0 0 14px;
  }
  .efa-c-main h3:not(:first-of-type) { margin-top: 32px; }
  .efa-c-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }

  /* ============ FOOTER VARIATIONS ============ */
  .ftr-base { border-top: 1px solid var(--border); background: var(--surface-2); }

  .ftr-B { padding: 48px 32px 28px; }
  .ftr-B-cols {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
    gap: 40px;
    padding-bottom: 32px; border-bottom: 1px solid var(--border);
  }
  .ftr-B-col h5 {
    font-size: 12px; font-weight: 600;
    color: var(--text); margin: 0 0 14px;
    letter-spacing: -0.01em;
  }
  .ftr-B-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .ftr-B-col a { font-size: 12px; color: var(--muted); transition: color .15s; }
  .ftr-B-col a:hover { color: var(--text); }
  .ftr-B-col .brand .tagline { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.5; max-width: 220px; }
  .ftr-B-bottom {
    padding-top: 18px;
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted);
  }
  .ftr-B-bottom .links { display: flex; gap: 20px; }

  /* Responsive */
  @media (max-width: 980px) {
    .grid-A { grid-template-columns: repeat(2, 1fr); }

  // ====== STATE ======
  function readHash() {
    // hash format: #H-A.Hero-A.M-A.EFA-A or #view=efa&header=B&...
    const h = location.hash.replace(/^#/, '');
    if (!h) return null;
    try {
      const out = {};
      h.split('.').forEach(p => {
        const [k, v] = p.split('-');
        const keyMap = { H: 'header', Hero: 'hero', M: 'modules', EFA: 'efa', V: 'view' };
        if (keyMap[k]) out[keyMap[k]] = v;
      });
      return Object.keys(out).length ? out : null;
    } catch { return null; }
  }
  function writeHash() {
    location.hash = `H-${state.header}.Hero-${state.hero}.M-${state.modules}.EFA-${state.efa}.V-${state.view}`;
  }

  const defaults = { view: 'home', header: 'A', hero: 'A', modules: 'A', efa: 'A' };
  const stored = JSON.parse(localStorage.getItem('itest-combo') || 'null');
  const state = Object.assign({}, defaults, stored || {}, readHash() || {});

  // ====== RENDER ======
  const preview = document.getElementById('preview');
  function render() {
    const parts = [V.header[state.header]];
    if (state.view === 'home') {
      parts.push(V.hero[state.hero]);
      parts.push(V.modules[state.modules]);
    } else {
      parts.push(V.efa[state.efa]);
    }
    parts.push(V.footer.B);

    // Force re-animation
    preview.style.animation = 'none';
    void preview.offsetHeight;
    preview.style.animation = '';
    preview.innerHTML = parts.join('\n');

    initInteractive();
    syncPicker();
    persist();
  }

  function initInteractive() {
    // EFA A segmented control
    const seg = preview.querySelector('#seg-A');
    if (seg) {
      seg.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          seg.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const key = btn.dataset.seg;
          preview.querySelectorAll('[data-seg-content]').forEach(g => {
            g.style.display = g.dataset.segContent === key ? '' : 'none';
          });
        });
      });
    }

    // Cross-page jumps (homepage card → EFA, EFA breadcrumb → home)
    preview.querySelectorAll('[data-jump]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        state.view = el.dataset.jump === 'efa' ? 'efa' : 'home';
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function syncPicker() {
    document.querySelectorAll('.picker-seg button').forEach(btn => {
      btn.classList.toggle('active', state[btn.dataset.key] === btn.dataset.val);
    });
    // Dim controls that don't affect current view
    document.querySelectorAll('.picker-group').forEach(g => {
      const ctrl = g.dataset.control;
      let dim = false;
      if (state.view === 'home' && ctrl === 'efa') dim = true;
      if (state.view === 'efa' && (ctrl === 'hero' || ctrl === 'modules')) dim = true;
      g.classList.toggle('dim', dim);
    });
    // Combo label
    document.getElementById('combo-label').innerHTML =
      `H<strong>${state.header}</strong> · Hero<strong>${state.hero}</strong> · M<strong>${state.modules}</strong> · EFA<strong>${state.efa}</strong> · F<strong>B</strong>`;
    document.getElementById('hash-readout').textContent =
      `#H-${state.header}.Hero-${state.hero}.M-${state.modules}.EFA-${state.efa}.V-${state.view}`;
  }

  function persist() {
    localStorage.setItem('itest-combo', JSON.stringify(state));
    writeHash();
  }

  // ====== EVENT BINDINGS ======
  document.querySelectorAll('.picker-seg button').forEach(btn => {
    btn.addEventListener('click', () => {
      state[btn.dataset.key] = btn.dataset.val;
      render();
    });
  });

  // Theme toggle
  const themeBtn = document.getElementById('theme-toggle');
  const moon = themeBtn.querySelector('.moon');
  const sun = themeBtn.querySelector('.sun');
  function syncTheme() {
    const isDark = document.documentElement.classList.contains('dark');
    moon.style.display = isDark ? '' : 'none';
    sun.style.display = isDark ? 'none' : '';
  }
  syncTheme();
  themeBtn.addEventListener('click', () => {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('itest-theme', isDark ? 'dark' : 'light');
    syncTheme();
  });

  // Keyboard shortcuts: 1 = Homepage, 2 = EFA, T = theme
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === '1') { state.view = 'home'; render(); }
    if (e.key === '2') { state.view = 'efa';  render(); }
    if (e.key.toLowerCase() === 't') themeBtn.click();
  });

  // Initial render
  render();
</script>
